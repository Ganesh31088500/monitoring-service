server:
  port: 8086

spring:
  application:
    name: MONITOR-SERVICE

  datasource:
    url: jdbc:mysql://localhost:3306/monitor_db
    username: root
    password: root

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: VGhpcy1pcy1BUElXYXRjaC1TdXBlci1TZWNyZXQtS2V5LUZvci1KV1QtMjAyNg==
  issuer: apiwatch-auth-service
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: "*"